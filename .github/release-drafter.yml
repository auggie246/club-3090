# Release Drafter config — maintains a draft GitHub release continuously,
# categorizing PRs by label or by conventional-commit prefix in the title.
#
# Versioning model: CalVer (year.month.day). The repo is a rolling config
# stack, not a versioned API, so date tags are honest about that. The
# resolver below is a placeholder; we override at publish time with
# `gh release edit` or by tagging directly. See scripts/release.sh.

name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

# We tag manually with CalVer; this is just a placeholder default Release
# Drafter computes for the draft. Final tag is set by `git tag` + push.
version-resolver:
  default: patch

categories:
  - title: '🎯 New models + serving paths'
    labels:
      - 'new-model'
      - 'serving-path'

  - title: '🔧 Pin bumps + upstream'
    labels:
      - 'pin-bump'
      - 'upstream'

  - title: '📊 Benchmarks + cross-rig data'
    labels:
      - 'benchmark'
      - 'cross-rig'

  - title: '⚠️ Cliffs, gotchas, regressions'
    labels:
      - 'cliff'
      - 'gotcha'
      - 'regression'

  - title: '🛠️ Scripts + tooling'
    labels:
      - 'scripts'
      - 'tooling'
      - 'ci'

  - title: '🐛 Bug fixes'
    labels:
      - 'bug'
      - 'fix'

  - title: '📝 Documentation'
    labels:
      - 'docs'
      - 'documentation'

  - title: '🧹 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'maintenance'

# Auto-apply labels based on PR title prefix (conventional-commit style)
# OR files touched. Matches the prefix conventions already used in commit
# messages: docs:, scripts:, composes:, models:, fix:, feat:, chore:.
autolabeler:
  - label: 'docs'
    title:
      - '/^docs(\(.*\))?:/'
      - '/^doc:/'
    files:
      - 'docs/**/*'
      - '*.md'

  - label: 'scripts'
    title:
      - '/^scripts(\(.*\))?:/'
    files:
      - 'scripts/**/*'

  - label: 'tooling'
    title:
      - '/^tools(\(.*\))?:/'
      - '/^ci(\(.*\))?:/'
    files:
      - '.github/**/*'
      - 'tools/**/*'

  - label: 'pin-bump'
    title:
      - '/pin bump/i'
      - '/bump.*genesis/i'
      - '/bump.*vllm/i'
      - '/bump.*sglang/i'

  - label: 'benchmark'
    title:
      - '/^bench(\(.*\))?:/'
      - '/benchmarks?\b/i'
    files:
      - 'BENCHMARKS.md'
      - 'docs/HARDWARE.md'

  - label: 'new-model'
    title:
      - '/^models(\(.*\))?:/'
      - '/add.*support.*for/i'
    files:
      - 'models/**/compose/**/*.yml'

  - label: 'serving-path'
    title:
      - '/^composes(\(.*\))?:/'
    files:
      - 'models/**/*.yml'

  - label: 'fix'
    title:
      - '/^fix(\(.*\))?:/'

  - label: 'chore'
    title:
      - '/^chore(\(.*\))?:/'
      - '/^refactor(\(.*\))?:/'
      - '/^style(\(.*\))?:/'

  - label: 'cliff'
    title:
      - '/cliff/i'
      - '/regression/i'
    files:
      - 'docs/CLIFFS.md'

  - label: 'upstream'
    title:
      - '/upstream/i'
    files:
      - 'docs/UPSTREAM.md'

template: |
  ## What's in this release

  $CHANGES

  ## Pinning to this release

  This is a snapshot of the rolling stack — not a versioned API. To pin to this exact state:

  ```bash
  git checkout $RESOLVED_VERSION
  ```

  When posting cross-rig benchmark numbers ([disc #86](https://github.com/noonghunna/club-3090/discussions/86)), please include this version tag (or the commit SHA) so others can reproduce against the same script revision. Tracking in [issue #112](https://github.com/noonghunna/club-3090/issues/112).

  **Full diff:** https://github.com/noonghunna/club-3090/compare/$PREVIOUS_TAG...$RESOLVED_VERSION

change-template: '- $TITLE (#$NUMBER) — @$AUTHOR'
change-title-escapes: '\<*_&'

exclude-labels:
  - 'skip-release-notes'
  - 'duplicate'
  - 'invalid'
