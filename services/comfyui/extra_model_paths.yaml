# ComfyUI extra_model_paths.yaml
# Aliases the unet/ directory into diffusion_models/ and vice-versa, so loaders that look in
# either folder can find GGUF DiTs (HunyuanVideo, Wan2.2-Animate) and SVDQuant safetensors
# (FLUX nunchaku) regardless of which custom node is loading them.
#
# Mounted into the container at /workspace/ComfyUI/extra_model_paths.yaml by docker-compose.

comfyui_extra:
    base_path: /workspace/ComfyUI/models
    diffusion_models: |
        diffusion_models
        unet
    unet: |
        unet
        diffusion_models
    text_encoders: |
        text_encoders
        clip
    clip: |
        clip
        text_encoders
    vae: vae
    loras: loras
    checkpoints: checkpoints
    controlnet: controlnet
    upscale_models: upscale_models
